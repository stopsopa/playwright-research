name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: 24
jobs:
  ubuntu-local-chromium:
    timeout-minutes: 60
    runs-on: ubuntu-20.04 # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: install chromium
        run: node node_modules/.bin/playwright install chromium
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t local --headless --project chromium
  ubuntu-local-firefox:
    timeout-minutes: 60
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: install firefox
        run: node node_modules/.bin/playwright install firefox
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t local --headless --project firefox

  monterey-local-chromium:
    timeout-minutes: 60
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: install chromium
        run: node node_modules/.bin/playwright install chromium
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t local --headless --project chromium

  monterey-local-firefox:
    timeout-minutes: 60
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: install firefox
        run: node node_modules/.bin/playwright install firefox
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t local --headless --project firefox

  ubuntu-docker-chromium:
    timeout-minutes: 60
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t docker --project chromium
  ubuntu-docker-firefox:
    timeout-minutes: 60
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: yarn install
        run: yarn
      - name: run server
        run: node server.js &
      - name: playwright tests
        run: |
          /bin/bash playwright.sh -t docker --project firefox

# https://playwright.dev/docs/ci
